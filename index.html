<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<link rel="stylesheet" href="index.css">
</head>
<body>

<div class="login-card">
  <div class="brand-head">
    <div class="school-photo" aria-hidden="true"></div>
    <h1>Cambridge EM School</h1>
    <p>Student Admissions Portal</p>
  </div>

  <div class="field">
    <label for="email">Email</label>
    <input id="email" type="email" placeholder="Enter your email">
  </div>

  <div class="field">
    <label for="password">Password</label>
    <input id="password" type="password" placeholder="Enter your password">
  </div>

  <div class="helper-row">
    <button class="link-btn" type="button" onclick="forgotPassword()">Forgot password?</button>
  </div>

  <div class="btn-row">
    <button class="btn-primary" onclick="login()">Login</button>
    <button class="btn-secondary" onclick="register()">Register</button>
  </div>

  <p id="authMessage" class="auth-message" aria-live="polite"></p>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>

<script src="app.js"></script>

</body>
</html>
